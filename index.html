<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangalore Upcoming Programs</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/css/bootstrap-select.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/bootstrap-select.min.js"></script>
    <style>
        :root { 
            --aol-orange: #ff7f00; 
            --aol-blue: #007bff;
            --primary-purple: #8B5CF6;
            --secondary-pink: #EC4899;
            --success-green: #10B981;
            --warning-yellow: #FBBF24;
        }
        
        body { 
            background: #f8f9fa;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        
        .hero-section { 
            background: linear-gradient(135deg, rgba(255,127,0,0.95) 0%, rgba(139,92,246,0.95) 100%);
            padding: 30px 0; 
            border-bottom: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .hero-section h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 3rem;
            margin-bottom: 2rem;
        }
        
        .custom-control-input-label {
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .custom-control-inline {
            margin-right: 2rem;
        }
        
        .custom-control-input:checked ~ .custom-control-input-label {
            color: #FBBF24;
            font-weight: 700;
        }
        
        /* Style actual radio buttons */
        input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #FBBF24;
            cursor: pointer;
            margin-right: 8px;
        }
        
        .search-container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .radio-group {
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 10px 20px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.4);
        }
        
        .search-box { 
            height: 50px; 
            border-radius: 35px; 
            border: 3px solid white;
            font-size: 1.2rem; 
            padding: 0 30px; 
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .search-box:focus { 
            border-color: #FBBF24;
            box-shadow: 0 10px 30px rgba(251,191,36,0.4);
            transform: translateY(-2px);
            background: white;
        }
        
        .selectpicker.form-control {
            height: 50px !important;
            border-radius: 25px;
            border: 3px solid white;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .bootstrap-select .dropdown-toggle {
            height: 50px !important;
            border-radius: 25px !important;
            border: 5px solid white !important;
            background: rgba(255,255,255,0.95) !important;
            padding: 0 20px !important;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        
        .bootstrap-select .dropdown-toggle:focus,
        .bootstrap-select .dropdown-toggle:hover {
            border-color: #FBBF24 !important;
            box-shadow: 0 10px 30px rgba(251,191,36,0.4) !important;
            background: white !important;
        }
        
        .bootstrap-select {
            z-index: 1050 !important;
        }
        
        .bootstrap-select .dropdown-menu {
            z-index: 1060 !important;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25) !important;
            border-radius: 15px !important;
            border: 2px solid rgba(139,92,246,0.3) !important;
        }
        
        .hero-section {
            position: relative;
            z-index: 100;
        }
        
        .container.py-5 {
            position: relative;
            z-index: 10;
        }
        
        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .search-input-wrapper {
            flex: 1;
            min-width: 300px;
        }
        
        .dropdown-wrapper {
            flex: 1;
            min-width: 250px;
        }
        
        .program-card { 
            border: none; 
            border-radius: 20px; 
            transition: all 0.4s ease; 
            cursor: pointer; 
            background: linear-gradient(135deg, #ffffff 0%, #dcc235ab 100%);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-left: 5px solid var(--aol-orange);
            overflow: hidden;
        }
        
        .program-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 20px 40px rgba(139,92,246,0.3) !important;
            border-left-color: var(--primary-purple);
        }
        
        .card-category { 
            font-weight: bold; 
            background: linear-gradient(135deg, var(--aol-orange), var(--secondary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 1.5px; 
        }
        
        .modal-content { 
            border-radius: 25px; 
            border: none;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        
        .modal-header { 
            border-bottom: 2px solid #f0f0f0;
            padding: 30px 30px 20px;
            background: linear-gradient(135deg, rgba(139,92,246,0.1) 0%, rgba(236,72,153,0.1) 100%);
        }
        
        .modal-body { 
            padding: 20px 30px 30px; 
            line-height: 1.8; 
        }
        
        .badge-status { 
            border-radius: 12px; 
            padding: 6px 14px; 
            font-size: 0.75rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        
        .table-responsive {
            background: white !important;
            border-radius: 20px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15) !important;
            overflow: hidden;
        }
        
        .table thead th {
            background: rgba(225, 222, 36, 0.1) !important;
            color: black !important;
            border: none !important;
            padding: 20px 15px !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        
        .table tbody tr {
            transition: all 0.3s ease;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .table tbody tr:hover {
            background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(236,72,153,0.08));
            transform: scale(1.01);
        }
        
        #searchHint {
            color: white !important;
            font-size: 1rem;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        
        .btn-outline-danger {
            border: 2px solid #EF4444 !important;
            color: #EF4444 !important;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-outline-danger:hover {
            background: #EF4444 !important;
            color: white !important;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(239,68,68,0.3);
        }
        
        #result-count {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .container.py-5 {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            padding: 20px !important;
            margin-top: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .logo {
            width: 150px;
            display: block;
            margin: 27px auto 7px auto;
        }
        
        /* ── Mobile: stack table rows as cards ── */
        @media (max-width: 767px) {
            .hero-section h1 { font-size: 1.6rem; margin-bottom: 1rem; }
            
            .search-container {
                border-radius: 20px;
                padding: 15px;
            }
            
            .search-row { flex-direction: column; gap: 10px; }
            .search-input-wrapper, .dropdown-wrapper { min-width: 100%; }
            
            .radio-group { padding: 8px 15px; margin-bottom: 15px; }

            /* Hide table header on mobile */
            .table-responsive { background: transparent !important; box-shadow: none !important; border-radius: 0 !important; }
            .table thead { display: none; }

            /* Each row becomes a card */
            .table tbody tr {
                display: block;
                background: white;
                border-radius: 16px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                margin-bottom: 16px;
                padding: 0;
                border: none;
                overflow: hidden;
            }
            .table tbody tr:hover { transform: none; }

            /* Each cell becomes a labelled row */
            .table tbody td {
                display: flex;
                align-items: flex-start;
                padding: 10px 16px !important;
                border: none !important;
                border-bottom: 1px solid #f0f0f0 !important;
                font-size: 0.9rem;
            }
            .table tbody td:last-child { border-bottom: none !important; }

            /* Data labels via data-label attribute */
            .table tbody td::before {
                content: attr(data-label);
                font-weight: 700;
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: #8B5CF6;
                min-width: 90px;
                margin-right: 10px;
                padding-top: 2px;
                flex-shrink: 0;
            }
            
            /* First cell (date) gets a colored header bar */
            .table tbody td:first-child {
                background: linear-gradient(135deg, rgba(255,127,0,0.1), rgba(139,92,246,0.1));
                font-weight: 600;
                border-bottom: 2px solid rgba(139,92,246,0.2) !important;
            }
            
            /* Calendar icon cell — keep it readable */
            .calendar-icon { margin: 0 auto; }
            
            .container.py-5 { padding: 10px !important; margin-top: 10px; border-radius: 0; }
            
            #result-count { font-size: 1rem; }
            
            .d-flex.justify-content-between { flex-direction: column; gap: 10px; align-items: flex-start !important; }
        }
    </style>
</head>
<body>
<img src="Art-of-Living_Logo.png" alt="Art of Living Logo" class="logo">
<div class="hero-section">
    <div class="container text-center">
        <h1 class="font-weight-bold mb-4">Art of Living Programs in Bangalore</h1>
        
        <div class="search-container mx-auto" style="max-width: 900px;">
            <div class="radio-group mb-4">
                <label style="cursor:pointer; display: inline-flex; align-items: center; margin-right: 30px;">
                    <input type="radio" id="modePincode" name="searchMode" value="pincode" checked onchange="clearSearch()">
                    <span class="custom-control-input-label">📍 Pincode</span>
                </label>
                <label style="cursor:pointer; display: inline-flex; align-items: center;">
                    <input type="radio" id="modeAddress" name="searchMode" value="address" onchange="clearSearch()">
                    <span class="custom-control-input-label">🏘️ Area/Address</span>
                </label>
            </div>

            <div class="search-row">
                <div class="search-input-wrapper">
                    <input type="text" id="mainSearch" class="form-control search-box" 
                           placeholder="Enter 6-digit Pincode (e.g. 560067)" onkeyup="handleSearchTrigger()">
                </div>
                <div class="dropdown-wrapper">
                    <select id="courseFilter" class="selectpicker form-control" multiple title="All Programs" data-live-search="true" onchange="handleSearchTrigger()">
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container py-5">
    <div id="landing-view" class="row"></div>
    <div id="search-view" style="display: none;">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h3 id="result-count" class="font-weight-bold" style="color: rgb(0, 123, 255)"></h3>
            <div class="form-inline mt-2">
                <alert id="pageSizeHint" class="alert-primary p-1 mb-0" role="alert" style="font-size: 0.8rem; border-radius: 15px;">
                    Number of results per page:
                </alert>
                <select id="pageSize" class="form-control form-control-sm rounded-pill" onchange="changePageSize(this.value)">
                    <option value="5" selected>5</option>
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                </select>
            </div>
        </div>
        <button class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="clearSearch()">Reset Search</button>
    </div>

    <div class="table-responsive bg-white rounded shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="bg-light">
                    <tr>
                        <th>Start Date</th>
                        <th>Time</th>
                        <th>Program</th>
                        <th>Location</th>
                        <th>Teachers</th>
                        <th>Contact & Register</th>
                    </tr>
            </thead>
            <tbody id="search-results-body"></tbody>
        </table>
    </div>

    <div class="d-flex justify-content-center align-items-center mt-4 pb-5">
        <button id="prevPage" class="btn btn-outline-primary rounded-pill mr-3" onclick="prevPage()" disabled>
            <i class="bi bi-chevron-left"></i> Previous
        </button>
        <span id="pageInfo" class="font-weight-bold">Page 1 of 1</span>
        <button id="nextPage" class="btn btn-outline-primary rounded-pill ml-3" onclick="nextPage()" disabled>
            Next <i class="bi bi-chevron-right"></i>
        </button>
    </div>
</div>
</div>

<div class="modal fade" id="programModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content shadow-lg">
            <div id="modal-content-body"></div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
    // After each search render, label table cells for mobile card view
    const labels = ['Start Date', 'Time', 'Program', 'Location', 'Teachers', 'Contact & Register'];
    function labelMobileCells() {
        document.querySelectorAll('#search-results-body tr').forEach(function(row) {
            row.querySelectorAll('td').forEach(function(td, i) {
                td.setAttribute('data-label', labels[i] || '');
            });
        });
    }
    // Observe mutations on the results body to auto-label whenever rows are added
    const observer = new MutationObserver(labelMobileCells);
    document.addEventListener('DOMContentLoaded', function() {
        const tbody = document.getElementById('search-results-body');
        if (tbody) observer.observe(tbody, { childList: true, subtree: false });
    });
</script>
</html>
